kind = "web"
previewPath = "/"
title = "School ERP SaaS Website"
version = "1.0.0"
id = "artifacts/school-erp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 23757
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/school-erp run dev"

[services.env]
PORT = "23757"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/school-erp", "run", "build"]
publicDir = "artifacts/school-erp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
