packages:
  "framer-motion": "Required for smooth page transitions, scroll reveals, and interactive component animations to give the premium SaaS feel."
  "react-hook-form": "Needed for handling the complex Request Demo and Contact forms efficiently."
  "@hookform/resolvers": "Needed for Zod validation integration with react-hook-form."

images:
  - path: "artifacts/school-erp/public/images/dashboard-hero.png"
    description: "Modern, clean, minimal web dashboard interface floating in 3D space, showing charts, graphs, and student data metrics. The design uses a deep navy blue and warm beige color palette with subtle teal and orange accents. Premium SaaS look."
    aspect_ratio: "16:9"
  - path: "artifacts/school-erp/public/images/education-abstract.png"
    description: "Abstract geometric composition representing modern education and technology. Clean lines, soft shadows, using a cohesive palette of deep navy, teal, yellow, and orange on a warm beige background."
    aspect_ratio: "16:9"
  - path: "artifacts/school-erp/public/images/avatar-1.png"
    description: "Minimalist, premium vector illustration portrait of a professional smiling, using navy and teal colors, clean beige background. Modern flat design."
    aspect_ratio: "1:1"
  - path: "artifacts/school-erp/public/images/avatar-2.png"
    description: "Minimalist, premium vector illustration portrait of a professional educator, using warm yellow and orange accents, clean beige background. Modern flat design."
    aspect_ratio: "1:1"

notes:
  - This is a fully static marketing site, so there are no real backend API integrations required.
  - Forms (Contact, Request Demo) will use mock handlers to simulate submission success states.
  - Using Framer Motion for all interaction polish.
